<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMS - Orders</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">📦</div>
            <div><h2>SIMS</h2><span>Smart Inventory</span></div>
        </div>
        <nav class="sidebar-nav">
    <a href="/frontend/dashboard.html" class="nav-item">🏠 Dashboard</a>
    <a href="/frontend/products.html" class="nav-item">🛍️ Products</a>
    <a href="/frontend/orders.html" class="nav-item">📦 Orders</a>
    <a href="/frontend/customers.html" class="nav-item">👥 Customers</a>
    <a href="/frontend/transactions.html" class="nav-item">💳 Transactions</a>
    <a href="/frontend/profile.html" class="nav-item">👤 Profile</a>
</nav>
<div class="sidebar-bottom">
    <a href="#" onclick="logout()" class="nav-item logout">🚪 Logout</a>
</div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div>
                <h1 class="page-title">Orders Management</h1>
                <p class="page-sub">Track and manage all your orders</p>
            </div>
            <button id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>

        <!-- ADD ORDER FORM -->
        <div class="table-container" style="margin-bottom:20px;">
            <h2 class="section-title" style="margin-bottom:16px;">➕ Add New Order</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:10px;">
                <input type="text" id="customerName" placeholder="Customer Name"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="number" id="customerId" placeholder="Customer ID"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="text" id="productName" placeholder="Product Name"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="number" id="productId" placeholder="Product ID"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="text" id="companyName" placeholder="Company Name"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="number" id="quantity" placeholder="Quantity"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="number" id="totalPrice" placeholder="Total Price (₹)"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <select id="status"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                    <option value="PENDING">Pending</option>
                    <option value="CONFIRMED">Confirmed</option>
                    <option value="DELIVERED">Delivered</option>
                    <option value="CANCELLED">Cancelled</option>
                </select>
            </div>
            <button onclick="addOrder()"
                style="margin-top:14px; padding:12px 28px; background:#2563eb; color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">
                ➕ Add Order
            </button>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <div class="section-header">
                <h2 class="section-title">All Orders</h2>
                <input type="text" id="search" placeholder="🔍 Search orders..."
                    onkeyup="searchOrder()"
                    style="padding:8px 14px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; width:220px;">
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Company</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="orderTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="orders.js"></script>
<script src="common.js"></script>
<script src="theme.js"></script>
</body>
</html>
