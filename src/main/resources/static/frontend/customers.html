<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMS - Customers</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">📦</div>
            <div><h2>SIMS</h2><span>Smart Inventory</span></div>
        </div>
        <nav class="sidebar-nav">
    <a href="/frontend/dashboard.html" class="nav-item">🏠 Dashboard</a>
    <a href="/frontend/products.html" class="nav-item">🛍️ Products</a>
    <a href="/frontend/orders.html" class="nav-item">📦 Orders</a>
    <a href="/frontend/customers.html" class="nav-item">👥 Customers</a>
    <a href="/frontend/transactions.html" class="nav-item">💳 Transactions</a>
    <a href="/frontend/profile.html" class="nav-item">👤 Profile</a>
</nav>
<div class="sidebar-bottom">
    <a href="#" onclick="logout()" class="nav-item logout">🚪 Logout</a>
</div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div>
                <h1 class="page-title">Customers Management</h1>
                <p class="page-sub">Manage all your customers</p>
            </div>
            <button id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>

        <!-- ADD CUSTOMER FORM -->
        <div class="table-container" style="margin-bottom:20px;">
            <h2 class="section-title" style="margin-bottom:16px;">➕ Add New Customer</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:10px;">
                <input type="text" id="customerName" placeholder="Full Name"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="email" id="customerEmail" placeholder="Email"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="text" id="customerPhone" placeholder="Phone Number"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                <input type="text" id="customerAddress" placeholder="Address"
                    style="padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
            </div>
            <button onclick="addCustomer()"
                style="margin-top:14px; padding:12px 28px; background:#2563eb; color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">
                ➕ Add Customer
            </button>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <div class="section-header">
                <h2 class="section-title">All Customers</h2>
                <input type="text" id="search" placeholder="🔍 Search customer..."
                    onkeyup="searchCustomer()"
                    style="padding:8px 14px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; width:220px;">
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="customerTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="customers.js"></script>
<script src="common.js"></script>
<script src="theme.js"></script>
</body>
</html>
