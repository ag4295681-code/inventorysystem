<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMS - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">📦</div>
            <div><h2>SIMS</h2><span>Smart Inventory</span></div>
        </div>
        <nav class="sidebar-nav">
    <a href="/frontend/dashboard.html" class="nav-item">🏠 Dashboard</a>
    <a href="/frontend/products.html" class="nav-item">🛍️ Products</a>
    <a href="/frontend/orders.html" class="nav-item">📦 Orders</a>
    <a href="/frontend/customers.html" class="nav-item">👥 Customers</a>
    <a href="/frontend/transactions.html" class="nav-item">💳 Transactions</a>
    <a href="/frontend/profile.html" class="nav-item">👤 Profile</a>
</nav>
<div class="sidebar-bottom">
    <a href="#" onclick="logout()" class="nav-item logout">🚪 Logout</a>
</div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div>
                <h1 class="page-title">User Profile</h1>
                <p class="page-sub">Manage your account details</p>
            </div>
            <button id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>

        <!-- PROFILE CARD -->
        <div style="display:grid; grid-template-columns:1fr 1.5fr; gap:20px; align-items:start;">

            <!-- LEFT — Avatar + Info -->
            <div class="table-container" style="text-align:center; padding:30px;">
                <img id="profileImage"
                    src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff&size=120"
                    style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:4px solid #2563eb; margin-bottom:16px;">
                <br>
                <label style="display:inline-block; margin-bottom:16px; cursor:pointer;">
                    <span style="padding:8px 16px; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; cursor:pointer;">
                        📷 Change Photo
                    </span>
                    <input type="file" id="imageUpload" accept="image/*" style="display:none;">
                </label>
                <h2 id="profileName" style="font-size:20px; font-weight:700; color:#0f172a; margin-bottom:6px;"></h2>
                <p id="profileEmail" style="font-size:13px; color:#64748b; margin-bottom:12px;"></p>
                <span style="background:#dcfce7; color:#16a34a; padding:4px 14px; border-radius:20px; font-size:12px; font-weight:600;">
                    ✅ Active
                </span>
                <p style="margin-top:12px; font-size:13px; color:#64748b;">
                    Role: <strong>Inventory Manager</strong>
                </p>
            </div>

            <!-- RIGHT — Edit Form -->
            <div class="table-container" style="padding:30px;">
                <h2 class="section-title" style="margin-bottom:20px;">✏️ Edit Profile</h2>

                <div style="display:flex; flex-direction:column; gap:14px;">
                    <div>
                        <label style="font-size:12px; font-weight:600; color:#64748b; letter-spacing:1px;">FULL NAME</label>
                        <input type="text" id="editName" placeholder="Your full name"
                            style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; margin-top:6px;">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:600; color:#64748b; letter-spacing:1px;">EMAIL</label>
                        <input type="email" id="editEmail" placeholder="Your email"
                            style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; margin-top:6px;">
                    </div>
                    <button onclick="updateProfile()"
                        style="padding:12px; background:#2563eb; color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">
                        💾 Save Changes
                    </button>
                </div>

                <hr style="margin:24px 0; border:none; border-top:1px solid #e2e8f0;">

                <h2 class="section-title" style="margin-bottom:20px;">🔒 Change Password</h2>
                <div style="display:flex; flex-direction:column; gap:14px;">
                    <div>
                        <label style="font-size:12px; font-weight:600; color:#64748b; letter-spacing:1px;">OLD PASSWORD</label>
                        <input type="password" id="oldPassword" placeholder="Current password"
                            style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; margin-top:6px;">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:600; color:#64748b; letter-spacing:1px;">NEW PASSWORD</label>
                        <input type="password" id="newPassword" placeholder="New password"
                            style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; margin-top:6px;">
                    </div>
                    <button onclick="changePassword()"
                        style="padding:12px; background:#059669; color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">
                        🔑 Change Password
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="profile.js"></script>
<script src="common.js"></script>
<script src="theme.js"></script>
</body>
</html>
